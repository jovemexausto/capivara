name: build-gki-android16-virtio-mmio-tpm

on:
  workflow_dispatch:

jobs:
  build-gki:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: Checkout capivara
        uses: actions/checkout@v4
        
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo rm -rf /usr/share/swift /usr/local/share/boost
          sudo docker rmi $(docker images -q) 2>/dev/null || true
          sudo apt-get clean
          df -h
        
      - name: Add extra swap
        run: |
          sudo dd if=/dev/zero of=/mnt/extra-swapfile bs=1M count=8192
          sudo chmod 600 /mnt/extra-swapfile
          sudo mkswap /mnt/extra-swapfile
          sudo swapon /mnt/extra-swapfile
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-dev build-essential git curl repo \
            bc flex bison libssl-dev libelf-dev

          git config --global user.email "ci@capivara.dev"
          git config --global user.name "Capivara CI"

      # /tmp/kernel é o checkout `repo sync` da árvore AOSP pinada em
      # patches/kernel/pinned-manifest.xml. Esse manifest fixa um SHA exato por projeto, então o
      # conteúdo do checkout só muda quando o arquivo de manifest muda — cachear por hash dele evita
      # reclonar vários GB via `repo sync` em toda execução manual deste workflow.
      # Nota: o checkout completo (com toolchains prebuilt) passou de 10GB localmente, perto do
      # limite de 10GB por repositório do actions/cache — se o cache não for salvo (silenciosamente
      # pulado pelo GitHub quando excede o limite), o build simplesmente volta a clonar do zero,
      # sem quebrar; não há regressão de correção, só de velocidade nesse caso.
      - name: Cache repo sync (AOSP kernel checkout)
        uses: actions/cache@v4
        with:
          path: /tmp/kernel
          key: gki-repo-sync-${{ hashFiles('patches/kernel/pinned-manifest.xml') }}

      - name: Build kernel (aarch64)
        run: |
          "$GITHUB_WORKSPACE/scripts/kernel/build-gki-android16-virtio-mmio-tpm.sh" /tmp/artifacts /tmp/kernel /tmp/kernel-dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gki-android16-virtio-mmio-tpm-${{ github.run_id }}
          path: /tmp/artifacts/
          retention-days: 30
